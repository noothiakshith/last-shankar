version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nexiserp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nexiserp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-engine:
    build:
      context: ./python-ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ml-models:/tmp/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-nexiserp}?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-supersecretkey}
      - JWT_TTL=${JWT_TTL:-86400}
      - PYTHON_SERVICE_URL=http://ml-engine:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ml-models:/app/artifacts/models

volumes:
  pgdata:
  ml-models:
